name: Publish tool images

# Builds and pushes only tools whose files changed since the last commit.
# Discovery: tools/<slug>/pengine-tool.json (stable marker; content can stay `{}`).
# Metadata for image tags + npm: catalog/entries/pengine-<slug>.json. Build: Dockerfile.

on:
  workflow_dispatch:
    inputs:
      tools:
        description: 'Comma-separated tool slugs (directory names under tools/), or "all"'
        required: false
        default: "all"
  push:
    branches: [main]
    paths:
      - "tools/**"
      - "catalog/entries/**"
    tags:
      - "*-v*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      skip: ${{ steps.detect.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed tools
        id: detect
        run: |
          set -euo pipefail

          # List slugs that contain pengine-tool.json (marker); keep only if Dockerfile + catalog exist.
          all_slugs=""
          while IFS= read -r s; do
            [[ -z "$s" ]] && continue
            [[ -f "tools/${s}/Dockerfile" ]] || continue
            [[ -f "catalog/entries/pengine-${s}.json" ]] || continue
            all_slugs="${all_slugs}${s}"$'\n'
          done < <(find tools -maxdepth 2 -name pengine-tool.json -printf '%h\n' | sed 's|^tools/||' | sort -u)
          all_slugs=$(echo -n "$all_slugs" | sort -u)

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            input="${{ github.event.inputs.tools }}"
            if [[ "$input" == "all" || -z "$input" ]]; then
              slugs="$all_slugs"
            else
              slugs=$(echo "$input" | tr ',' '\n' | xargs)
            fi
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Tag like "file-manager-v0.2.0" → slug "file-manager"
            tag="${{ github.ref_name }}"
            slug="${tag%-v*}"
            if echo "$all_slugs" | grep -qx "$slug"; then
              slugs="$slug"
            else
              echo "Tag '$tag' does not match any tool (marker + Dockerfile + catalog)"
              echo 'skip=true' >> "$GITHUB_OUTPUT"
              echo 'matrix=[]' >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            # Push to main: tools/<slug>/ or catalog/entries/pengine-<slug>.json changed
            changed=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git ls-files)
            slugs_tools=$(echo "$changed" | grep '^tools/' | cut -d/ -f2 | sort -u)
            # catalog/entries/pengine-file-manager.json → slug file-manager
            slugs_cat=$(echo "$changed" | grep '^catalog/entries/pengine-.*\.json$' | while read -r path; do
              b=$(basename "$path" .json)
              echo "${b#pengine-}"
            done | sort -u)
            slugs=$(printf '%s\n%s\n' "$slugs_tools" "$slugs_cat" | sort -u | grep -v '^$' || true)
          fi

          valid=""
          for s in $slugs; do
            if [[ -f "tools/${s}/pengine-tool.json" ]] && [[ -f "tools/${s}/Dockerfile" ]] && [[ -f "catalog/entries/pengine-${s}.json" ]]; then
              valid="$valid\"$s\","
            fi
          done
          valid="[${valid%,}]"

          if [[ "$valid" == "[]" ]]; then
            echo 'skip=true' >> "$GITHUB_OUTPUT"
          else
            echo 'skip=false' >> "$GITHUB_OUTPUT"
          fi
          echo "matrix=$valid" >> "$GITHUB_OUTPUT"
          echo "Publishing: $valid"

  publish:
    needs: detect
    if: needs.detect.outputs.skip == 'false'
    runs-on: ubuntu-latest
    concurrency:
      group: tools-publish-${{ matrix.slug }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        slug: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3

      - name: Read tool coordinates from catalog
        id: cfg
        run: |
          set -euo pipefail
          CATALOG="catalog/entries/pengine-${{ matrix.slug }}.json"
          [[ -f "$CATALOG" ]] || { echo "missing catalog: $CATALOG"; exit 1; }
          echo "image=ghcr.io/pengine-ai/tools/pengine-$(jq -r '.id | split("/")[1]' "$CATALOG")" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r '.current' "$CATALOG")" >> "$GITHUB_OUTPUT"

      - name: Resolve version from tag (override)
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" | sed 's/.*-v/version=/' >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.cfg.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upstream MCP npm from catalog (build-args)
        id: upstream
        run: |
          set -euo pipefail
          CATALOG="catalog/entries/pengine-${{ matrix.slug }}.json"
          PKG_DEFAULT='@modelcontextprotocol/server-filesystem'
          VER_DEFAULT='2026.1.14'
          PKG="$PKG_DEFAULT"
          VER="$VER_DEFAULT"
          if [[ -f "$CATALOG" ]]; then
            PKG=$(jq -r "(.upstream_mcp_npm // {}) | .package // \"\"" "$CATALOG")
            VER=$(jq -r "(.upstream_mcp_npm // {}) | .version // \"\"" "$CATALOG")
            [[ -n "$PKG" ]] || PKG="$PKG_DEFAULT"
            [[ -n "$VER" ]] || VER="$VER_DEFAULT"
          fi
          echo "package=$PKG" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: tools/${{ matrix.slug }}/
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            UPSTREAM_MCP_NPM_PACKAGE=${{ steps.upstream.outputs.package }}
            UPSTREAM_MCP_NPM_VERSION=${{ steps.upstream.outputs.version }}
          tags: |
            ${{ steps.cfg.outputs.image }}:${{ steps.version.outputs.version }}
            ${{ steps.cfg.outputs.image }}:latest

      - name: Sign image with cosign (keyless OIDC)
        run: cosign sign --yes "${{ steps.cfg.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: MCP smoke test
        run: |
          set -euo pipefail
          DIGEST="${{ steps.build.outputs.digest }}"
          IMAGE="${{ steps.cfg.outputs.image }}@${DIGEST}"
          docker pull "$IMAGE"
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"0.0.1"}}}' \
            | timeout 15 docker run --rm -i --network=none "$IMAGE" /tmp \
            | head -1 \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('result',{}).get('serverInfo'), f'bad init: {d}'"

      - name: Export image tarball (cold archive)
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          mkdir -p /tmp/archive
          docker save "${{ steps.cfg.outputs.image }}@${DIGEST}" \
            | gzip > "/tmp/archive/${{ matrix.slug }}-${{ steps.version.outputs.version }}.tar.gz"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.slug }}-${{ steps.version.outputs.version }}-archive
          path: /tmp/archive/*.tar.gz
          retention-days: 90

      - name: Job summary
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Published ${{ matrix.slug }}

          - **Version:** ${{ steps.version.outputs.version }}
          - **Image:** \`${{ steps.cfg.outputs.image }}@${DIGEST}\`
          - **Platforms:** linux/amd64, linux/arm64
          - **Signed:** cosign keyless (GitHub Actions OIDC)

          Update \`catalog/entries/pengine-${{ matrix.slug }}.json\` with digest:
          \`\`\`
          ${DIGEST}
          \`\`\`
          EOF
