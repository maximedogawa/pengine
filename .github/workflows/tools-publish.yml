name: Publish tool images

# Build and push tool container images to GHCR.
#
# tools/mcp-tools.json is the registry — one entry per tool.
# tools/<slug>/Dockerfile is the build context.
#
# Multi-arch: linux/arm64 is built on ubuntu-24.04-arm (native). Building arm64
# on ubuntu-latest uses QEMU; Node/npm often crashes with "Illegal instruction".
#
# Triggers:
#   - Push to main touching tools/** → build only changed tools
#   - Manual dispatch → pick one slug or "all"
#
# Shell logic lives in .github/scripts/tools-publish/*.sh

on:
  workflow_dispatch:
    inputs:
      tool:
        description: 'Tool slug (e.g. "file-manager") or "all"'
        required: false
        default: "all"
  push:
    branches: [main]
    paths: ["tools/**"]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      skip: ${{ steps.detect.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find tools to publish
        id: detect
        env:
          INPUT_TOOL: ${{ github.event.inputs.tool }}
        run: bash .github/scripts/tools-publish/detect-matrix.sh

  publish-arch:
    needs: detect
    if: needs.detect.outputs.skip == 'false'
    strategy:
      fail-fast: false
      matrix:
        slug: ${{ fromJson(needs.detect.outputs.matrix) }}
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read manifest
        id: cfg
        env:
          TOOL_SLUG: ${{ matrix.slug }}
        run: bash .github/scripts/tools-publish/read-tool-manifest.sh

      - name: Build and push (single arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: tools/${{ matrix.slug }}/
          platforms: linux/${{ matrix.arch }}
          push: true
          provenance: false
          sbom: false
          build-args: |
            UPSTREAM_MCP_NPM_PACKAGE=${{ steps.cfg.outputs.npm_pkg }}
            UPSTREAM_MCP_NPM_VERSION=${{ steps.cfg.outputs.npm_ver }}
          tags: ${{ steps.cfg.outputs.image }}:${{ steps.cfg.outputs.version }}-build-${{ github.run_id }}-${{ matrix.slug }}-${{ matrix.arch }}

      - name: Upload image ref for manifest merge
        run: |
          echo "${{ steps.cfg.outputs.image }}@${{ steps.build.outputs.digest }}" > image-ref.txt
      - uses: actions/upload-artifact@v4
        with:
          name: tool-${{ matrix.slug }}-${{ matrix.arch }}
          path: image-ref.txt
          retention-days: 2

  publish-merge:
    needs: [detect, publish-arch]
    if: needs.detect.outputs.skip == 'false'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slug: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3

      - name: Read manifest
        id: cfg
        env:
          TOOL_SLUG: ${{ matrix.slug }}
        run: bash .github/scripts/tools-publish/read-tool-manifest.sh

      - name: Download amd64 image ref
        uses: actions/download-artifact@v4
        with:
          name: tool-${{ matrix.slug }}-amd64
          path: arch-refs/amd64
      - name: Download arm64 image ref
        uses: actions/download-artifact@v4
        with:
          name: tool-${{ matrix.slug }}-arm64
          path: arch-refs/arm64

      - name: Merge manifest list
        id: merge
        env:
          IMAGE: ${{ steps.cfg.outputs.image }}
          VERSION: ${{ steps.cfg.outputs.version }}
          REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF: ${{ github.ref }}
          AMD_FILE: arch-refs/amd64/image-ref.txt
          ARM_FILE: arch-refs/arm64/image-ref.txt
        run: bash .github/scripts/tools-publish/merge-multiarch-manifest.sh

      - name: Sign image
        run: cosign sign --yes "${{ steps.cfg.outputs.image }}@${{ steps.merge.outputs.digest }}"

      - name: Smoke test (MCP init handshake)
        env:
          IMAGE_WITH_DIGEST: ${{ steps.cfg.outputs.image }}@${{ steps.merge.outputs.digest }}
        run: bash .github/scripts/tools-publish/smoke-test-mcp.sh

      - name: Summary
        env:
          TOOL_SLUG: ${{ matrix.slug }}
          TOOL_VERSION: ${{ steps.cfg.outputs.version }}
          IMAGE_REF: ${{ steps.cfg.outputs.image }}@${{ steps.merge.outputs.digest }}
          IMAGE_DIGEST: ${{ steps.merge.outputs.digest }}
        run: bash .github/scripts/tools-publish/write-publish-summary.sh
