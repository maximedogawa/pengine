services:
  pengine-web:
    image: ${PENGINE_WEB_IMAGE:-ghcr.io/pengine-ai/pengine-web:latest}
    container_name: pengine-app
    hostname: pengine
    restart: unless-stopped
    expose:
      - "1420"
    environment:
      # static-web-server (see deploy/Dockerfile); override here if needed behind a proxy
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=1420
      - SERVER_ROOT=/home/sws/public
      - SERVER_FALLBACK_PAGE=/home/sws/public/index.html
      - SERVER_LOG_LEVEL=error
    networks:
      pengui-network:
        aliases:
          - pengine
          - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:1420/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
