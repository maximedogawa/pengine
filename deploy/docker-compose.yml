services:
  pengine-web:
    image: ${PENGINE_WEB_IMAGE:-ghcr.io/pengine-ai/pengine-web:latest}
    container_name: pengine-app
    hostname: pengine
    restart: unless-stopped
    expose:
      - "1422"
    environment:
      # Vite preview (`npm run preview` in image); port fixed in Dockerfile CMD
      - NODE_ENV=production
    networks:
      pengui-network:
        aliases:
          - pengine
          - app
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:1422/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
